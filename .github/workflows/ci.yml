name: CI

on:
  push:
    branches: [main, Phase_3]
  pull_request:
    branches: [main]

permissions:
  contents: read
  dependency-graph: write

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    env:
      # Required by api/auth.py at import time (startup guard).
      # Tests use in-memory DuckDB — no real credentials needed.
      ADMIN_TOKEN: ci-test-admin-token
      DB_PATH: ":memory:"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all test suites
        run: |
          pytest \
            tests/test_smoke.py \
            tests/test_admin_api.py \
            tests/test_active_learning.py \
            tests/test_chemical_normalizer.py \
            tests/test_role_shield.py \
            tests/test_tenant_api.py \
            -v --tb=short

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_KEY: ci-placeholder
          VITE_ADMIN_TOKEN: ci-placeholder

  submit-pypi:
    name: Submit Python dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      dependency-graph: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate pip dependencies
        run: pip install --quiet pip-tools && pip-compile requirements.in -o requirements.txt --resolver=backtracking 2>/dev/null || true

      - name: Submit dependencies to GitHub
        uses: github/dependency-submission-action@v4
        with:
          dependency-files: requirements.txt
          snapshot-warning: false
